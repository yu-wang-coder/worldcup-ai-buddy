<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 聊天 — AI 看球搭子</title>
  <meta name="description" content="2026 世界杯 AI 聊天助手，陪你聊球、预测比赛、解答足球知识。" />
  <link rel="stylesheet" href="src/styles/variables.css" />
  <link rel="stylesheet" href="src/styles/reset.css" />
  <link rel="stylesheet" href="src/styles/global.css" />
  <link rel="stylesheet" href="src/styles/chat.css" />
</head>
<body>
  <nav class="header" id="app-header"></nav>

  <main class="chat-page">
    <div class="chat-header">
      <h1>🤖 AI 看球搭子</h1>
      <p>你的专属 AI 观赛助手，随时陪你聊球、分析</p>
    </div>

    <div class="chat-container">
      <div class="chat-messages" id="chat-messages"></div>

      <div class="chat-quick-replies" id="chat-quick-replies">
        <button class="chat-quick-reply" data-msg="谁会赢得 2026 世界杯？" type="button">谁会赢得 2026 世界杯？</button>
        <button class="chat-quick-reply" data-msg="分析一下阿根廷 vs 法国" type="button">分析一下阿根廷 vs 法国</button>
        <button class="chat-quick-reply" data-msg="给我讲一个足球冷知识" type="button">给我讲一个足球冷知识</button>
        <button class="chat-quick-reply" data-msg="越位规则是什么？" type="button">越位规则是什么？</button>
        <button class="chat-quick-reply" data-msg="预测梅西的表现如何？" type="button">预测梅西的表现如何？</button>
        <button class="chat-quick-reply" data-msg="黑马球队是哪支？" type="button">黑马球队是哪支？</button>
      </div>

      <div class="chat-input-container">
        <textarea
          id="chat-input"
          class="chat-input"
          placeholder="问我任何关于世界杯的问题..."
          rows="1"
        ></textarea>
        <button id="chat-send-btn" class="chat-send-btn" type="button">发送</button>
      </div>
    </div>
  </main>

  <footer class="footer" id="app-footer"></footer>

  <script type="module" src="src/pages/Chat.js"></script>
</body>
</html>
